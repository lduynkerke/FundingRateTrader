mexc:
  # SECRETS: leave blank here. Provide via env (MEXC_API_KEY / MEXC_SECRET_KEY)
  # or the gitignored config.local.yaml. The previously-committed key MUST be rotated.
  api_key: ""
  secret_key: ""
  base_urls:
    spot: "https://api.mexc.com"
    # contract trading: the .com edge WAF 403-blocks order/submit; the .co mirror does not.
    contract: "https://contract.mexc.co"
  timeout: 10

logging:
  log_dir: "logs"
  log_level: "DEBUG"
  console_log_level: "INFO"
  file_log_level: "INFO"
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  max_log_files: 30

# S1-Episode strategy (VERDICT.md "conditional GO" defaults)
strategy:
  entry_threshold: 0.01      # predicted funding >= 1% (lower bound only, no upper cap)
  min_age_days: 90.0         # contract listing age floor
  min_liq_quote_vol: 500.0   # quiet pre-event quote-vol per 5m bar ($)
  normalize_threshold: 0.001 # |pred rate| < 0.1% => episode over
  time_cap_hours: 24.0       # hard cap on hold time
  stop_pct: 0.175            # adverse-excursion hard stop (validated 0.15-0.20)
  equity_fraction: 0.05      # notional per trade as fraction of equity
  max_concurrent: 5          # max simultaneous positions
  leverage: 1                # isolated-margin leverage

runtime:
  mode: "paper"              # "paper" (simulated) or "live". KEEP paper until go-live gates pass.
  state_path: "state/engine_state.json"
  entry_delay_minutes: 15    # enter at funding + this many minutes (validated +5..+30)
  paper_start_equity: 10000.0

# --- Legacy (superseded; kept for reference, not used by the new runtime) ---
funding:
  snapshot_window_minutes: 10
  log_interval_hours: 4
  top_n_symbols: 5
  time_windows:
    daily_days_back: 3
    hourly_hours_back: 8
    ten_min_hours_before: 2
    one_min_minutes_before: 15
    one_min_minutes_after: 15
